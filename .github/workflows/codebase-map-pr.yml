# HC-AI | ticket: FDD-TOOL-CODEMAP
# CM-S2-09: PR Impact Comment Bot
# Comments structural impact analysis on every PR using `codebase-map diff`.

name: Codebase Map — PR Impact

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install codebase-map
        run: pip install -e .

      - name: Generate graph
        run: |
          python -m codebase_map generate -c codebase-map-self.yaml || true
          ls -la docs/function-map/ || true

      - name: Compute impact diff (robust)
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          EMPTY='{"ref":"","changed_files":[],"changed_nodes":[],"impacted_nodes":[],"stats":{}}'

          if [ ! -f docs/function-map/graph.json ]; then
            echo "[WARN] graph.json not found — writing empty impact"
            echo "$EMPTY" > /tmp/pr-impact.json
            exit 0
          fi

          python -m codebase_map diff "$BASE_SHA" \
            -f docs/function-map/graph.json --json \
            > /tmp/pr-impact.raw 2> /tmp/pr-impact.err

          # Validate JSON; fall back to empty if invalid/empty
          if [ ! -s /tmp/pr-impact.raw ] || \
             ! python -c "import json,sys; json.load(open('/tmp/pr-impact.raw'))" 2>/dev/null; then
            echo "[WARN] diff output invalid — writing empty impact"
            cat /tmp/pr-impact.err || true
            echo "$EMPTY" > /tmp/pr-impact.json
          else
            cp /tmp/pr-impact.raw /tmp/pr-impact.json
          fi

          echo "--- /tmp/pr-impact.json ---"
          cat /tmp/pr-impact.json

      - name: Format & post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python <<'PY'
          import json
          import os
          import subprocess

          # Resilient load
          try:
              with open("/tmp/pr-impact.json") as f:
                  data = json.load(f)
          except (OSError, json.JSONDecodeError) as e:
              print(f"[WARN] Could not parse impact JSON: {e}")
              data = {"changed_files": [], "changed_nodes": [], "impacted_nodes": []}

          changed_files = data.get("changed_files") or []
          changed_nodes = data.get("changed_nodes") or []
          impacted_nodes = data.get("impacted_nodes") or []

          n_files = len(changed_files)
          n_changed = len(changed_nodes)
          n_impact = len(impacted_nodes)

          if n_impact > 50:
              risk = "🔴 High"
          elif n_impact >= 10:
              risk = "🟡 Medium"
          else:
              risk = "🟢 Low"

          def node_id(n):
              if isinstance(n, dict):
                  return n.get("id") or n.get("name") or "?"
              return str(n)

          top = [node_id(n) for n in impacted_nodes[:10]]
          top_md = "\n".join(f"- `{t}`" for t in top) if top else "_(none)_"

          marker = "<!-- codebase-map-pr-bot -->"
          body = (
              f"{marker}\n"
              "## 🗺️ Codebase Map — PR Impact\n\n"
              "| Metric | Value |\n"
              "|--------|-------|\n"
              f"| Changed files | {n_files} |\n"
              f"| Changed nodes | {n_changed} |\n"
              f"| Impact zone | {n_impact} |\n"
              f"| Risk | {risk} |\n\n"
              "**Top impacted nodes:**\n"
              f"{top_md}\n\n"
              "_Auto-generated by `codebase-map diff` (CM-S2-09)._\n"
          )

          pr = os.environ["PR_NUMBER"]
          repo = os.environ["GH_REPO"]

          # Find existing bot comment (upsert by marker)
          existing_id = None
          result = subprocess.run(
              ["gh", "api", f"repos/{repo}/issues/{pr}/comments"],
              capture_output=True, text=True, check=False,
          )
          if result.returncode == 0 and result.stdout:
              try:
                  for c in json.loads(result.stdout):
                      if marker in (c.get("body") or ""):
                          existing_id = c["id"]
                          break
              except json.JSONDecodeError:
                  pass

          if existing_id:
              subprocess.run(
                  ["gh", "api", "-X", "PATCH",
                   f"repos/{repo}/issues/comments/{existing_id}",
                   "-f", f"body={body}"],
                  check=False,
              )
              print(f"[OK] Updated comment {existing_id}")
          else:
              subprocess.run(
                  ["gh", "pr", "comment", pr, "--body", body],
                  check=False,
              )
              print("[OK] Posted new comment")
          PY
