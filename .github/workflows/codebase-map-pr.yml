# HC-AI | ticket: FDD-TOOL-CODEMAP
# CM-S2-09: PR Impact Comment Bot
# Comments structural impact analysis on every PR using `codebase-map diff`.

name: Codebase Map — PR Impact

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install codebase-map
        run: pip install -e .

      - name: Generate graph (base + head)
        run: |
          codebase-map generate -c codebase-map-self.yaml || true
          test -f docs/function-map/graph.json || \
            codebase-map generate -c codebase-map-self.yaml

      - name: Compute impact diff
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          codebase-map diff "$BASE_SHA" \
            -f docs/function-map/graph.json --json > /tmp/pr-impact.json || \
            echo '{"changed_files":[],"changed_nodes":[],"impacted_nodes":[],"stats":{}}' \
              > /tmp/pr-impact.json
          cat /tmp/pr-impact.json

      - name: Format & post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python <<'PY'
          import json, os, subprocess

          with open("/tmp/pr-impact.json") as f:
              data = json.load(f)

          changed = len(data.get("changed_nodes", []))
          impact = len(data.get("impacted_nodes", []))
          files = len(data.get("changed_files", []))

          if impact > 50:
              risk = "🔴 High"
          elif impact >= 10:
              risk = "🟡 Medium"
          else:
              risk = "🟢 Low"

          top = data.get("impacted_nodes", [])[:10]
          top_md = "\n".join(f"- `{n}`" for n in top) or "_(none)_"

          marker = "<!-- codebase-map-pr-bot -->"
          body = f"""{marker}
          ## 🗺️ Codebase Map — PR Impact

          | Metric | Value |
          |--------|-------|
          | Changed files | {files} |
          | Changed nodes | {changed} |
          | Impact zone | {impact} |
          | Risk | {risk} |

          **Top impacted nodes:**
          {top_md}

          _Auto-generated by `codebase-map diff` (CM-S2-09)._
          """

          pr = os.environ["PR_NUMBER"]
          # Upsert: find existing comment with marker, edit if found
          result = subprocess.run(
              ["gh", "api", f"repos/${{ github.repository }}/issues/{pr}/comments"],
              capture_output=True, text=True, check=False,
          )
          existing_id = None
          try:
              for c in json.loads(result.stdout or "[]"):
                  if marker in c.get("body", ""):
                      existing_id = c["id"]; break
          except Exception:
              pass

          if existing_id:
              subprocess.run(
                  ["gh", "api", "-X", "PATCH",
                   f"repos/${{ github.repository }}/issues/comments/{existing_id}",
                   "-f", f"body={body}"], check=False)
          else:
              subprocess.run(
                  ["gh", "pr", "comment", pr, "--body", body], check=False)
          PY
