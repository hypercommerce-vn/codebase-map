# HC-AI | ticket: FDD-TOOL-CODEMAP
name: CI — Codebase Map

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install "black==24.10.0" "isort==5.13.2" flake8

      - name: Lint — black
        run: black --check --target-version py310 codebase_map/

      - name: Lint — isort
        run: isort --check --profile black codebase_map/

      - name: Lint — flake8
        run: flake8 codebase_map/ --exclude=codebase_map/exporters/d3.v7.min.js

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test — generate on self
        run: |
          # Create a minimal config to test on this repo
          cat > test-config.yaml << 'EOF'
          project: "codebase-map-self-test"
          sources:
            - path: "codebase_map"
              language: python
              base_module: "codebase_map"
              exclude: ["__pycache__", "d3.v7.min.js"]
          output:
            dir: "test-output"
            formats: [json]
          graph:
            depth: 3
            group_by: module
          EOF
          python -m codebase_map generate -c test-config.yaml
          # Verify output exists and has content
          test -f test-output/graph.json
          python -c "import json; d=json.load(open('test-output/graph.json')); assert d['stats']['total_nodes'] > 10, f'Too few nodes: {d[\"stats\"][\"total_nodes\"]}'; print(f'Self-test OK: {d[\"stats\"][\"total_nodes\"]} nodes')"

  # HC-AI | ticket: FDD-TOOL-CODEMAP
  # CM-S1-05: Auto-generate map on PR — verify HTML output + D3 bundle
  generate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate — JSON + HTML
        run: |
          cat > gen-config.yaml << 'EOF'
          project: "codebase-map-ci"
          sources:
            - path: "codebase_map"
              language: python
              base_module: "codebase_map"
              exclude: ["__pycache__", "d3.v7.min.js"]
          output:
            dir: "docs/function-map"
            formats: [json, html]
          graph:
            depth: 3
            group_by: module
          EOF
          python -m codebase_map generate -c gen-config.yaml

      - name: Verify — JSON output
        run: |
          test -f docs/function-map/graph.json
          python -c "
          import json
          d = json.load(open('docs/function-map/graph.json'))
          nodes = d['stats']['total_nodes']
          edges = d['stats']['total_edges']
          assert nodes > 10, f'Too few nodes: {nodes}'
          assert edges > 10, f'Too few edges: {edges}'
          print(f'JSON OK: {nodes} nodes, {edges} edges')
          "

      - name: Verify — HTML output
        run: |
          test -f docs/function-map/index.html
          python -c "
          html = open('docs/function-map/index.html').read()
          size = len(html)
          assert size > 100000, f'HTML too small: {size} bytes (D3 not bundled?)'
          checks = [
              ('topbar', 'id=\"topbar\"'),
              ('sidebar', 'id=\"sidebar\"'),
              ('domain-tree', 'id=\"domain-tree\"'),
              ('toolbar', 'id=\"toolbar\"'),
              ('minimap', 'id=\"minimap\"'),
              ('legend', 'id=\"legend\"'),
              ('D3 force', 'forceSimulation'),
          ]
          for name, token in checks:
              assert token in html, f'MISSING in HTML: {name}'
          print(f'HTML OK: {size:,} bytes, all {len(checks)} components present')
          "

      - name: Upload map artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebase-map
          path: docs/function-map/
          retention-days: 14

  # HC-AI | ticket: FDD-TOOL-CODEMAP
  # Telegram notify CEO — CI pass/fail
  notify:
    runs-on: ubuntu-latest
    needs: [lint, test, generate]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Telegram — CI passed
        if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.generate.result == 'success'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="✅ *CI PASSED* — Codebase Map
          *PR:* #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}
          *Branch:* \`${{ github.head_ref }}\`
          *Author:* ${{ github.actor }}
          *Status:* Lint ✅ | Test ✅ | Generate ✅
          🔗 [Review PR](${{ github.event.pull_request.html_url }})"

      - name: Telegram — CI failed
        if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.generate.result == 'failure'
        run: |
          LINT_STATUS=${{ needs.lint.result == 'success' && '✅' || '❌' }}
          TEST_STATUS=${{ needs.test.result == 'success' && '✅' || '❌' }}
          GEN_STATUS=${{ needs.generate.result == 'success' && '✅' || '❌' }}
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="❌ *CI FAILED* — Codebase Map
          *PR:* #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}
          *Branch:* \`${{ github.head_ref }}\`
          *Author:* ${{ github.actor }}
          *Status:* Lint ${LINT_STATUS} | Test ${TEST_STATUS} | Generate ${GEN_STATUS}
          🔗 [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
